<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <script src="df.js" defer type="module"></script>
</head>
<body>
    <div>
        <input type="number" max="99" min="0" value="0" placeholder="Час" class="time">
        <input type="number" max="60" min="0" value="0" placeholder="Минута" class="time">
        <input type="number" max="60" min="0" value="0" placeholder="Секунда" class="time">
        <button id="start">Start</button>
        <button id="stop">Stop</button>
        <h1 id="outputtext">0 : 0: 0</h1>
        
    </div>
</body>
</html>
